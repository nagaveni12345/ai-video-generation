version: '3.9'

services:
  backend:
    build:
      context: ./backend
    container_name: backend-container
    ports:
      - "8000:8000"
    command: python manage.py runserver 0.0.0.0:8000

  frontend:
    build:
      context: ./frontend
    container_name: frontend-container
    ports:
      - "5173:5173"
    command: npm run dev -- --host