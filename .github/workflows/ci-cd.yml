name: AI Video Generation CI/CD Pipeline


on:
push:
branches:
- dev-2

jobs:

ci-cd:
runs-on: ubuntu-latest
steps:

# =========================
# STEP 1 — Checkout Code
# =========================
- name: Checkout Code
  uses: actions/checkout@v4

# =========================
# STEP 2 — Setup Python
# =========================
- name: Setup Python
  uses: actions/setup-python@v5
  with:
    python-version: "3.10"
    #===============
#STEP 3 — Backend Validation
# =========================
- name: Install Backend Dependencies
  working-directory: backend
  run: |
    python -m pip install --upgrade pip
    pip install -r requirements.txt
    
STEP 4 — Setup Node.js
# =========================
- name: Setup Node.js
  uses: actions/setup-node@v4
  with:
    node-version: "20"

# =========================
# STEP 5 — Frontend Validation
# =========================
- name: Install Frontend Dependencies
  working-directory: frontend
  run: npm install
  
- name: Build Frontend
  working-directory: frontend
  run: npm run build

# =========================
# STEP 6 — Docker Login
# =========================
- name: Login to Docker Hub
  uses: docker/login-action@v3
  with:
    username: ${{ secrets.DOCKER_USERNAME }}
    password: ${{ secrets.DOCKER_PASSWORD }}

# =========================
# STEP 7 — Setup Docker Buildx
# =========================
- name: Set up Docker Buildx
  uses: docker/setup-buildx-action@v3

# =========================
# STEP 8 — Build Backend Image
# =========================
- name: Build Backend Image
  run: |
    docker build \
    -f infra/Dockerfile.backend \
    -t ${{ secrets.DOCKER_USERNAME }}/ai-backend:latest .

# =========================
# STEP 9 — Push Backend Image
# =========================
- name: Push Backend Image
  run: |
    docker push ${{ secrets.DOCKER_USERNAME }}/ai-backend:latest

# =========================
# STEP 10 — Build Frontend Image
# =========================
- name: Build Frontend Image
  run: |
    docker build \
    -f infra/Dockerfile.frontend \
    -t ${{ secrets.DOCKER_USERNAME }}/ai-frontend:latest .

# =========================
# STEP 11 — Push Frontend Image
# =========================
- name: Push Frontend Image
  run: |
    docker push ${{ secrets.DOCKER_USERNAME }}/ai-frontend:latest
